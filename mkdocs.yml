site_name: AI Training — ML Security
site_description: Security engineering for systems that contain machine learning.
site_author: AI Training — ML Security contributors
repo_url: https://github.com/stratomarco/ai-training-ml-security
repo_name: stratomarco/ai-training-ml-security
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

not_in_nav: |
  /modules/**
  /labs/**
  /templates/**
  /instructor/**
  /assessments/**

